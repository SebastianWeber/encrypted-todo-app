name: encrypted_todo_app
description: "ToDo-App mit privatem GitHub-Repo als verschlüsseltem Backend."
publish_to: 'none'

# Version wird im Release-Build aus dem Git-Tag überschrieben
# (--build-name / --build-number in .github/workflows/release.yml).
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  cryptography: ^2.7.0
  flutter_secure_storage: ^9.2.2
  http: ^1.2.0
  path_provider: ^2.1.4
  uuid: ^4.4.0
  intl: any # Version wird von flutter_localizations vorgegeben
  flutter_local_notifications: ^19.0.0
  flutter_timezone: ^4.0.0
  timezone: ^0.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
